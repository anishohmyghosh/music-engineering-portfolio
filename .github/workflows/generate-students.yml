name: Generate Student Pages

on:
  push:
    branches: ["main"]
    paths:
      - "_projects/**"
      - "scripts/generate_students.rb"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Generate student pages
        run: ruby scripts/generate_students.rb

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add students/*.md
          git diff --cached --quiet || git commit -m "Auto-generate student pages"

      - name: Push changes
        run: |
          git push
